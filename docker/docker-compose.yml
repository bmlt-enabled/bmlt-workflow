name: bmlt-workflow

networks:
  default:
    name: testnet
    external: true

services:

  bmltmock:
    image: mockoon/cli:latest
    volumes:
      - ../mockoon:/data:ro
    command:
      - "--data"
      - "/data/${MOCKOON_FILE:-bmlt3x.json}"
      - "/data/bmlt3x-geocode_off.json"
      - "/data/bmlt3x-states_on.json"
      - "/data/bmlt unsupported.json"
      - "--port"
      - "3001"
      - "3002"
      - "3003"
      - "3004"

  wordpress-db:
    build:
      context: .
      dockerfile: Dockerfile-wordpress-db
    tmpfs: /var/lib/mysql
    platform: linux/x86_64
    # disable TLS — wp-cli + mysql client both refuse the self-signed cert
    # mysql:5.7 generates by default, and we don't need encryption inside the test net
    command: ["--skip-ssl"]
    environment:
      MYSQL_ROOT_PASSWORD: somewordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -psomewordpress --silent"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s

  wordpress-php8-singlesite:
    build:
      context: .
      dockerfile: Dockerfile-wp-php8.3
    depends_on:
      wordpress-db:
        condition: service_healthy
    ports:
      - 80:80
    command: /usr/local/bin/wp-install.sh
    tmpfs: 
      - /var/www/html
      - /var/log
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress-php8-singlesite
      WORDPRESS_HOST: wordpress-php8-singlesite
      WORDPRESS_NONCE_SALT: '4hJ:ZRFUAdfFEBq=z$$9+]Bk|\!1y8V,h#w4aNGy~o7u|BBR;u(ASi],u[Cp46qRQa'
      WORDPRESS_PORT: 80
      BMLT: ${BMLT}
      BMLT_PORT: ${BMLT_PORT}
    volumes:
      - ../:/plugin
      - ./logs/:/var/log/apache2
      - ../../wpcache:/root/.wp-cli/cache/core/
      - /var/run/docker.sock.raw:/var/run/docker.sock

  wordpress-php8-multisitesingle:
    build:
      context: .
      dockerfile: Dockerfile-wpmultisite-php8.3
    depends_on:
      wordpress-db:
        condition: service_healthy
    ports:
      - 81:81
    command: /usr/local/bin/wp-multisite-install.sh
    tmpfs: 
      - /var/www/html
      - /var/log
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress-php8-multisitesingle
      WORDPRESS_DEBUG: true
      WORDPRESS_MULTISITE_INSTALL: true
      WORDPRESS_NONCE_SALT: '4hJ:ZRFUAdfFEBq=z$$9+]Bk|\!1y8V,h#w4aNGy~o7u|BBR;u(ASi],u[Cp46qRQa'
      WORDPRESS_HOST: wordpress-php8-multisitesingle
      WORDPRESS_PORT: 81
      NOPLUGIN: 'true'
      BMLT: ${BMLT}
      BMLT_PORT: ${BMLT_PORT}
    volumes:
      - ../:/plugin
      - ./logs/:/var/log/apache2
      - ../../wpcache:/root/.wp-cli/cache/core/

  wordpress-php8-multinetwork:
    build:
      context: .
      dockerfile: Dockerfile-wpmultisite-php8.3
    depends_on:
      wordpress-db:
        condition: service_healthy
    command: /usr/local/bin/wp-multisite-install.sh
    ports:
      - 82:82
    tmpfs: 
      - /var/www/html
      - /var/log
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress-php8-multinetwork
      WORDPRESS_DEBUG: true
      WORDPRESS_MULTISITE_INSTALL: true
      WORDPRESS_NONCE_SALT: '4hJ:ZRFUAdfFEBq=z$$9+]Bk|\!1y8V,h#w4aNGy~o7u|BBR;u(ASi],u[Cp46qRQa'
      WORDPRESS_HOST: wordpress-php8-multinetwork
      WORDPRESS_PORT: 82
      BMLT: ${BMLT}
      BMLT_PORT: ${BMLT_PORT}
    volumes:
      - ../:/plugin
      - ./logs/:/var/log/apache2
      - ../../wpcache:/root/.wp-cli/cache/core/

  wordpress-php8-dbupgrade:
    build:
      context: .
      dockerfile: Dockerfile-wp-php8.3
    depends_on:
      wordpress-db:
        condition: service_healthy
    ports:
      - 83:83
    command: bash -c "/usr/local/bin/wp-install-dbupgrade.sh"
    tmpfs: 
      - /var/www/html
      - /var/log
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress-php8-dbupgrade
      WORDPRESS_HOST: wordpress-php8-dbupgrade
      WORDPRESS_NONCE_SALT: '4hJ:ZRFUAdfFEBq=z$$9+]Bk|\!1y8V,h#w4aNGy~o7u|BBR;u(ASi],u[Cp46qRQa'
      WORDPRESS_PORT: 83
      BMLT: ${BMLT}
      BMLT_PORT: ${BMLT_PORT}
    volumes:
      - ../:/plugin
      - ../tests/dbupgrade:/sql-import
      - ./logs/:/var/log/apache2
      - ../../wpcache:/root/.wp-cli/cache/core/
      - /var/run/docker.sock.raw:/var/run/docker.sock
